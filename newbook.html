<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuovo Libro</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style/index.css">





</head>

<body>
    <!-- NAVBAR-->
    <header>
        <nav class="navbar navbar-expand-lg bg-dark navbar-dark border-bottom border-body">
            <div class="container-fluid">
                <img src="img/duck.png" alt="logo">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" href="#">Anagrafica Utenti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" aria-disabled="true">Storico Prestiti</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link disabled" aria-disabled="true">Help</a>
                        </li>
                    </ul>

                    <form class="d-flex" role="search">
                        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
                        <button class="btn btn-outline-light" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container py-5">
            <h1 class="display-5 fw-semibold mb-5">Nuovo Libro</h1>
            <form>
                <div class="row g-4 mb-4">
                    <div class="col-6">
                        <label for="nomeAutore" class="form-label fw-semibold">Nome Autore</label>
                        <input type="text" class="form-control" id="nomeAutore"
                            placeholder="Inserisci il nome dell'autore">
                    </div>
                    <div class="col-6">
                        <label for="cognomeAutore" class="form-label fw-semibold">Cognome autore</label>
                        <input type="text" class="form-control" id="cognomeAutore"
                            placeholder="Inserisci il cognome dell'autore">
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col-12">
                        <label for="titoloLibro" class="form-label fw-semibold">Titolo</label>
                        <input type="text" class="form-control" id="titoloLibro"
                            placeholder="Inserisci il titolo del tuo libro">
                        <div class="form-text">Titolo versione italiana</div>
                    </div>
                </div>
                <div class="row g-4 mb-5">
                    <div class="col-12 col-lg-4">
                        <label for="genere" class="form-label fw-semibold">Genere</label>
                        <select id="genere" class="form-select">
                            <option value="" selected>Scegli il genere</option>
                            <option value="fantasy">Fantasy</option>
                            <option value="giallo">Giallo</option>
                            <option value="classico">Classico</option>
                        </select>
                    </div>
                </div>




            </form>
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

</body>

</html>
